<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProcessIQ | Rush School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#3B82F6',
                50: '#EFF6FF',
                100: '#DBEAFE',
                500: '#3B82F6',
                600: '#2563EB',
                700: '#1D4ED8',
              },
              sidebar: '#0f172a',
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --bg-main: #F8FAFC;
            --bg-white: #FFFFFF;
            --sidebar-bg: #0f172a;
            --sidebar-text: #e2e8f0;
            --sidebar-muted: #94a3b8;
            --border-color: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --primary: #3B82F6;
            --primary-light: #EFF6FF;
            --primary-dark: #2563EB;
            --success: #86EFAC;
            --success-light: #E6FFFA;
            --success-bg: #F0FFF4;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --warning-bg: #FFFBEB;
            --danger: #A78BFA;
            --danger-light: #EDE9FE;
            --purple: #A78BFA;
            --purple-light: #EDE9FE;
            --purple-bg: #F5F3FF;
            --orange: #F97316;
            --orange-light: #FED7AA;
            --orange-bg: #FFF7ED;
            --cyan: #06B6D4;
            --cyan-light: #A5F3FC;
            --cyan-bg: #ECFEFF;
            --indigo: #6366F1;
            --sidebar-width: 260px;
            --header-height: 64px;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-success: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --gradient-warning: linear-gradient(135deg, #F2994A 0%, #F2C94C 100%);
            --gradient-danger: linear-gradient(135deg, #EB5757 0%, #F2994A 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
        aside::-webkit-scrollbar-thumb {
            background-color: #334155;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
        }
        
        .logo-dots {
            position: relative;
            width: 40px;
            height: 40px;
        }
        .logo-dots span {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .logo-dots span:nth-child(1) { background: #EC4899; top: 0; left: 8px; }
        .logo-dots span:nth-child(2) { background: #F97316; top: 8px; left: 20px; }
        .logo-dots span:nth-child(3) { background: #06B6D4; top: 20px; left: 24px; }
        .logo-dots span:nth-child(4) { background: #86EFAC; top: 28px; left: 12px; }
        .logo-dots span:nth-child(5) { background: #A78BFA; top: 16px; left: 4px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            color: var(--sidebar-text);
            font-size: 0.95rem;
            font-weight: 500;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .nav-item.active {
            background: var(--indigo);
            color: white;
        }
        
        /* Submenu */
        .nav-submenu {
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 0 0 12px 12px;
            margin-top: -4px;
        }
        .nav-subitem {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px 12px 52px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--sidebar-muted);
            font-size: 0.9rem;
        }
        .nav-subitem:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--sidebar-text);
        }
        .nav-subitem.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Header Tabs */
        .header-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: var(--bg-main);
            color: var(--text-secondary);
        }
        .header-tab.active {
            background: var(--primary);
            color: white;
        }
        .header-tab:hover:not(.active) {
            background: var(--border-color);
        }

        /* Cards & Stats */
        .stat-card {
            border-radius: 16px;
            padding: 24px;
            position: relative;
            border: 1px solid transparent;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            line-height: 1;
        }

        /* Admission Hero */
        .admission-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .admission-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Forms */
        .questionnaire-single-page {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 24px;
            padding: 48px;
            max-width: 950px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .form-section {
            margin-bottom: 36px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: all 0.3s ease;
        }
        .form-section:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        .section-number {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 4px 8px rgba(59, 130, 246, 0.25);
        }

        /* Tables */
        .eleves-table { width: 100%; border-collapse: collapse; }
        .eleves-table th {
            padding: 18px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }
        .eleves-table td {
            padding: 16px;
            font-size: 0.9rem;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }
        .eleves-table tbody tr:hover { background: #f8fafc; }

        /* Badges & Tags */
        .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .tag.formation { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); color: #1D4ED8; }
        .tag.status.oui { background: #E6FFFA; color: #6EE7B7; }
        .tag.status.non { background: #EDE9FE; color: #8B5CF6; }

        /* NTC Specifics */
        .ntc-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(118, 75, 162, 0.08) 100%);
            border-radius: 28px;
            padding: 32px 40px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }
        .ntc-badge-live {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
