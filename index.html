<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProcessIQ | Rush School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#EFF6FF',
                100: '#DBEAFE',
                500: '#3B82F6',
                600: '#2563EB',
                700: '#1D4ED8',
              },
              sidebar: '#0f172a',
            }
          }
        }
      }
    </script>
    <style>
      :root {
            --bg-main: #F8FAFC;
            --bg-white: #FFFFFF;
            --sidebar-bg: #0f172a;
            --sidebar-text: #e2e8f0;
            --sidebar-muted: #94a3b8;
            --border-color: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --primary: #3B82F6;
            --primary-light: #EFF6FF;
            --primary-dark: #2563EB;
            --success: #86EFAC;
            --success-light: #E6FFFA;
            --success-bg: #F0FFF4;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --warning-bg: #FFFBEB;
            --danger: #A78BFA;
            --danger-light: #EDE9FE;
            --purple: #A78BFA;
            --purple-light: #EDE9FE;
            --purple-bg: #F5F3FF;
            --orange: #F97316;
            --orange-light: #FED7AA;
            --orange-bg: #FFF7ED;
            --cyan: #06B6D4;
            --cyan-light: #A5F3FC;
            --cyan-bg: #ECFEFF;
            --indigo: #6366F1;
            --sidebar-width: 260px;
            --header-height: 64px;
        }

      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 3px;
      }
      
      aside::-webkit-scrollbar-thumb {
        background-color: #334155;
      }

      /* Animations */
      @keyframes slideUpFade {
        0% {
          opacity: 0;
          transform: translateY(15px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .animate-slide-in {
        animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .animate-pulse-slow {
        animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .7; }
      }

      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Logo dots */
      .logo-dots {
          position: relative;
          width: 40px;
          height: 40px;
      }
      .logo-dots span {
          position: absolute;
          width: 12px;
          height: 12px;
          border-radius: 50%;
      }
      .logo-dots span:nth-child(1) { background: #EC4899; top: 0; left: 8px; }
      .logo-dots span:nth-child(2) { background: #F97316; top: 8px; left: 20px; }
      .logo-dots span:nth-child(3) { background: #06B6D4; top: 20px; left: 24px; }
      .logo-dots span:nth-child(4) { background: #86EFAC; top: 28px; left: 12px; }
      .logo-dots span:nth-child(5) { background: #A78BFA; top: 16px; left: 4px; }

      /* Admission Hero */
      .admission-hero {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          border-radius: 20px;
          padding: 40px;
          margin-bottom: 24px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          color: white;
          position: relative;
          overflow: hidden;
      }
      .admission-hero::before {
          content: '';
          position: absolute;
          top: -50%;
          right: -20%;
          width: 60%;
          height: 200%;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 50%;
      }

      /* Step Circle */
      .step-circle {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: var(--bg-main);
          border: 2px solid var(--border-color);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 700;
          font-size: 1rem;
          color: var(--text-muted);
          transition: all 0.3s;
      }
      .step-circle.active {
          background: var(--primary);
          border-color: var(--primary);
          color: white;
      }
      .step-circle.completed {
          background: var(--success);
          border-color: var(--success);
          color: white;
      }

      /* Formation Card */
      .formation-card {
          background: var(--bg-main);
          border: 2px solid var(--border-color);
          border-radius: 16px;
          padding: 24px;
          text-align: center;
          cursor: pointer;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .formation-card:hover {
          border-color: var(--primary);
          transform: translateY(-6px);
          box-shadow: 0 16px 32px rgba(59, 130, 246, 0.15);
          background: var(--bg-white);
      }
      .formation-card.selected {
          border-color: var(--primary);
          background: var(--primary-light);
      }
      .formation-card-icon.blue { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); }
      .formation-card-icon.green { background: #86EFAC; }
      .formation-card-icon.purple { background: #A78BFA; }
      .formation-card-icon.orange { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); }

      /* Upload Card */
      .upload-card.uploaded {
          border-color: var(--success);
          background: linear-gradient(135deg, #F0FFF4 0%, #E6FFFA 100%);
      }

      /* Eleves Hero */
      .eleves-hero {
          background: #6366F1;
          border-radius: 24px;
          padding: 32px 40px;
          margin-bottom: 28px;
          position: relative;
          overflow: hidden;
          border: 1px solid rgba(255,255,255,0.1);
          color: white;
      }
      .eleves-hero.danger { background: #A78BFA; }
      .eleves-hero.success { background: #86EFAC; }
      .eleves-hero::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
          opacity: 0.5;
      }

      /* Eleves Stats */
      .eleves-stat-card {
          background: white;
          border-radius: 20px;
          padding: 24px;
          border: 1px solid #e2e8f0;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          position: relative;
          overflow: hidden;
      }
      .eleves-stat-card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 4px;
          height: 100%;
          border-radius: 4px 0 0 4px;
      }
      .eleves-stat-card.danger::before { background: #A78BFA; }
      .eleves-stat-card.warning::before { background: linear-gradient(180deg, #F59E0B, #D97706); }
      .eleves-stat-card.success::before { background: #86EFAC; }
      .eleves-stat-card.info::before { background: linear-gradient(180deg, #3B82F6, #2563EB); }

      /* Eleves Table */
      .eleves-table { width: 100%; border-collapse: collapse; }
      .eleves-table thead.danger { background: #EDE9FE; }
      .eleves-table thead.success { background: #E6FFFA; }
      .eleves-table th {
          padding: 18px 16px;
          text-align: left;
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          color: #475569;
          border-bottom: 2px solid #e2e8f0;
          white-space: nowrap;
      }
      .eleves-table th.danger { color: #7C3AED; border-bottom-color: #DDD6FE; }
      .eleves-table th.success { color: #059669; border-bottom-color: #A7F3D0; }
      .eleves-table td {
          padding: 16px;
          font-size: 0.9rem;
          color: #334155;
          border-bottom: 1px solid #f1f5f9;
          vertical-align: middle;
      }
      .eleves-table tbody tr:hover { background: #f8fafc; }

      /* Tags */
      .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
      .tag.formation.mco { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); color: #1D4ED8; }
      .tag.formation.ndrc { background: linear-gradient(135deg, #F0FFF4, #E6FFFA); color: #48BB78; }
      .tag.formation.bachelor { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); color: #6D28D9; }
      .tag.formation.ntc { background: linear-gradient(135deg, #FFF7ED, #FFEDD5); color: #C2410C; }
      
      .tag.rupture { background: #EDE9FE; color: #5B21B6; }
      .tag.rupture.amiable { background: #E6FFFA; color: #48BB78; }
      .tag.rupture.demission { background: #DBEAFE; color: #1D4ED8; }
      .tag.rupture.periode-essai { background: #FEF3C7; color: #92400E; }
      
      .tag.status.oui { background: #E6FFFA; color: #6EE7B7; }
      .tag.status.non { background: #EDE9FE; color: #8B5CF6; }
      .tag.status.cerfa-valide { background: #E6FFFA; color: #6EE7B7; }
      .tag.status.cerfa-encours { background: #FEF3C7; color: #D97706; }

      /* NTC */
      .ntc-badge-live { background: linear-gradient(135deg, #7C3AED, #A78BFA); color: white; }
      .live-dot { background: #86EFAC; animation: pulse-dot 2s infinite; }
      @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.8); } }
      .ntc-data-table thead { background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%); color: white; }
      .ntc-row-highlighted { background: #FEF3C7 !important; }
      
      /* RH Stat Icons */
      .stat-icon.purple { background: linear-gradient(135deg, #6B5B73, #8B7B93); }
      .stat-icon.green { background: linear-gradient(135deg, #10B981, #34D399); }
      .stat-icon.orange { background: linear-gradient(135deg, #F59E0B, #FBBF24); }
      .stat-icon.blue { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
      .stat-icon.red { background: linear-gradient(135deg, #EF4444, #F87171); }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
